<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- 의도적으로 viewport 설정을 넣지 않음: 휴대폰에서 화면이 작게 보이거나 좌우 이동이 생김 -->
  <title>과제 제출 시스템 - 개선 전</title>
  <style>
    /*
      수행평가 보기 자료용 '개선 전' 화면
      실제 서비스라면 좋지 않은 예시입니다.
      학생들이 문제점을 관찰하기 쉽도록 일부러 불편하게 구성했습니다.
    */
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background-color: #eeeeee;
      color: #555;
      font-size: 12px;
      min-width: 1040px; /* 문제점: 휴대폰 화면보다 훨씬 넓게 고정 */
    }

    header {
      background-color: #333;
      color: #ddd;
      padding: 6px 8px;
      text-align: left; /* 문제점: 제목 위치가 애매함 */
    }

    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: normal;
    }

    main {
      width: 1040px; /* 문제점: 화면 크기에 맞춰 줄어들지 않음 */
      padding: 8px;
    }

    .help-text {
      color: #999;
      font-size: 11px;
      margin: 4px 0 8px;
    }

    /* 문제점 1: 탭 메뉴 구분이 약하고, 선택 상태가 거의 보이지 않음 */
    .tabs {
      margin: 4px 0 10px;
    }

    .tabs button {
      width: 72px;
      height: 24px;
      padding: 2px;
      border: 1px solid #cfcfcf;
      background: #e9e9e9;
      color: #777;
      font-size: 11px;
      cursor: pointer;
    }

    .tabs button.active {
      background: #e1e1e1;
      color: #777;
      border-color: #c9c9c9; /* 문제점: 활성 탭 차이가 거의 없음 */
      font-weight: normal;
    }

    h2 {
      margin: 8px 0 6px;
      font-size: 15px;
      font-weight: normal;
      color: #444;
    }

    /* 문제점 2: 표가 너무 넓고 작은 글씨로 구성됨 */
    table {
      width: 1120px;
      border-collapse: collapse;
      background: white;
      table-layout: fixed;
    }

    th,
    td {
      border: 1px solid #d0d0d0;
      padding: 5px 4px;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #555;
    }

    th {
      background: #f3f3f3;
      font-weight: normal;
      color: #666;
    }

    .status {
      color: #777; /* 문제점: 제출 상태가 강조되지 않음 */
      font-weight: normal;
    }

    /* 문제점 3: 버튼이 너무 작아 휴대폰에서 누르기 어려움 */
    .btn-small {
      font-size: 9px;
      padding: 1px 4px;
      min-width: 34px;
      height: 18px;
      border: 1px solid #aaa;
      background: #f4f4f4;
      color: #555;
      border-radius: 0;
    }

    /* 문제점 4: 로그아웃이 맨 아래에 작게 숨어 있음 */
    footer {
      margin-top: 80px;
      padding: 12px 8px;
      border-top: 1px solid #ccc;
      font-size: 10px;
      color: #aaa;
    }

    footer a {
      color: #aaa;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>과제 관리 시스템</h1>
  </header>

  <main>
    <div class="tabs">
      <button>공지사항</button>
      <button class="active">제출 확인</button>
      <button>과제방</button>
    </div>

    <h2>제출 현황</h2>
    <p class="help-text">※ 휴대폰에서는 화면을 확대하거나 좌우로 움직여 확인하세요.</p>

    <table>
      <thead>
        <tr>
          <th style="width:70px;">학번</th>
          <th style="width:70px;">이름</th>
          <th style="width:210px;">과제명</th>
          <th style="width:170px;">제출일시</th>
          <th style="width:110px;">상태</th>
          <th style="width:110px;">첨부파일</th>
          <th style="width:220px;">교사 확인 메모</th>
          <th style="width:80px;">관리</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>10101</td>
          <td>홍길동</td>
          <td>UI 개선 제안서</td>
          <td>2026-04-15 10:00</td>
          <td><span class="status">제출완료</span></td>
          <td>report_final_v2.html</td>
          <td>내용 확인 필요</td>
          <td><button class="btn-small">보기</button></td>
        </tr>
        <tr>
          <td>10102</td>
          <td>김학생</td>
          <td>화면구현 분석 보고서</td>
          <td>2026-04-15 10:08</td>
          <td><span class="status">확인중</span></td>
          <td>assignment.html</td>
          <td>모바일 개선 내용 부족</td>
          <td><button class="btn-small">보기</button></td>
        </tr>
      </tbody>
    </table>
  </main>

  <footer>
    <p>시스템 문의: 02-123-4567 | <a href="#">로그아웃</a></p>
  </footer>

  <script>
    // 탭 전환 기능: 선택 상태는 바뀌지만 화면 변화가 눈에 잘 띄지 않음
    const tabs = document.querySelectorAll('.tabs button');

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });

    // 로그아웃: 찾기 어렵고, 안내도 간단함
    document.querySelector('footer a').addEventListener('click', (e) => {
      e.preventDefault();
      alert('로그아웃');
    });
  </script>
</body>
</html>
